version: 0.2

env:
  variables:
    NODE_ENV: "production"

phases:
  install:
    commands:
      - echo Installing dependency...modules
      - npm install
  build:
    commands:
      - echo Build started on `date`
      - echo Compiling the Node.js code 
      - npm run build --debug
artifacts:
  files:
    - .next/**/*
    - locales/**/*
    - static/**/*
    - package.json
    - next.config.js
    - tsconfig.json
    - tsconfig.server.json